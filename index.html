<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | Secure Password Vault</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #101828, #1d2939, #344054);
      color: #f9fafb;
      font-family: Arial, Helvetica, sans-serif;
    }

    .vault-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    .form-control {
      background-color: rgba(255, 255, 255, 0.95);
      border: none;
    }

    .btn-primary {
      background-color: #7c3aed;
      border: none;
    }

    .btn-primary:hover {
      background-color: #6d28d9;
    }

    .badge-secure {
      background-color: rgba(124, 58, 237, 0.25);
      color: #ddd6fe;
      border: 1px solid rgba(196, 181, 253, 0.35);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand mb-0 h1">Secure Password Vault</span>
    <span class="badge badge-secure rounded-pill px-3 py-2">Argon2id + AES-GCM</span>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center mb-4">
      <div class="col-lg-10">
        <div class="vault-card p-4 p-md-5">
          <h1 class="fw-bold mb-2">Your Passwords, Your Account</h1>
          <p class="text-light opacity-75 mb-0">
            Log in to see passwords you saved previously, or create an account to start a private vault.
          </p>
        </div>
      </div>
    </div>

    <div class="row g-4 justify-content-center">
      <div class="col-lg-5">
        <div class="vault-card p-4 h-100">
          <h2 class="h3 mb-3">Log In</h2>
          <form id="loginForm">
            <label for="loginUsername" class="form-label">Username</label>
            <input class="form-control mb-3" id="loginUsername" autocomplete="username" required />

            <label for="loginPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control mb-3"
              id="loginPassword"
              autocomplete="current-password"
              required
            />

            <button type="submit" class="btn btn-primary w-100">Log In to Vault</button>
          </form>
          <div id="loginStatus" class="mt-3 small opacity-75" aria-live="polite"></div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="vault-card p-4 h-100">
          <h2 class="h3 mb-3">Create Account</h2>
          <form id="registerForm">
            <label for="registerUsername" class="form-label">Username</label>
            <input class="form-control mb-3" id="registerUsername" autocomplete="username" required />

            <label for="registerPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control mb-2"
              id="registerPassword"
              autocomplete="new-password"
              minlength="12"
              required
            />
            <p class="small opacity-75">Use at least 12 characters. This password unlocks your encrypted records.</p>

            <button type="submit" class="btn btn-outline-light w-100">Create Private Vault</button>
          </form>
          <div id="registerStatus" class="mt-3 small opacity-75" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function postAccountAction(url, payload) {
      return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    async function getError(response, fallback) {
      try {
        const data = await response.json();
        return data.error || fallback;
      } catch {
        return fallback;
      }
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("loginStatus");
      status.textContent = "Signing in...";

      const response = await postAccountAction("/api/login", {
        username: document.getElementById("loginUsername").value.trim(),
        password: document.getElementById("loginPassword").value
      });

      const result = await response.json();
      if (response.ok) {
        status.textContent = "Login successful. Opening your saved passwords...";
        window.location.href = "/vault";
        return;
      }

      status.textContent = result.error || "Unable to log in.";
    });

    document.getElementById("registerForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("registerStatus");
      status.textContent = "Creating your vault...";

      const response = await postAccountAction("/api/register", {
        username: document.getElementById("registerUsername").value.trim(),
        password: document.getElementById("registerPassword").value
      });

      if (response.ok) {
        status.textContent = "Account created. Opening your vault...";
        window.location.href = "/vault";
        return;
      }

      status.textContent = await getError(response, "Unable to create account.");
    });

    fetch("/api/status")
      .then((response) => response.json())
      .then((status) => {
        if (status.loggedIn) {
          window.location.href = "/vault";
        }
      });
  </script>
</body>
</html>
