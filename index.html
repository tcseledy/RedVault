<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | Red Vault</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(235, 0, 20, 0.18), transparent 36%),
        linear-gradient(135deg, #000000, #090909 55%, #150103);
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      flex: 1;
    }

    .vault-card {
      background: rgba(12, 12, 12, 0.92);
      border: 1px solid rgba(235, 0, 20, 0.32);
      border-radius: 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
    }

    .form-control {
      background-color: #080808;
      border: 1px solid rgba(235, 0, 20, 0.28);
      caret-color: #eb0014;
      color: #ffffff;
    }

    .form-control::selection {
      background: #eb0014;
      color: #ffffff;
    }

    .form-control:focus {
      background-color: #0f0f0f;
      border-color: #eb0014;
      box-shadow: 0 0 0 0.25rem rgba(235, 0, 20, 0.2);
      color: #ffffff;
    }

    .btn-primary {
      background-color: #eb0014;
      border: none;
    }

    .btn-primary:hover {
      background-color: #ff2638;
    }

    .btn-outline-light {
      border-color: rgba(235, 0, 20, 0.65);
      color: #ffffff;
    }

    .btn-outline-light:hover {
      background-color: #eb0014;
      border-color: #eb0014;
      color: #ffffff;
    }

    .badge-secure {
      background-color: rgba(235, 0, 20, 0.16);
      color: #ffb3ba;
      border: 1px solid rgba(235, 0, 20, 0.45);
    }

    .brand-lock {
      color: #eb0014;
      font-weight: 800;
    }

    .app-footer {
      border-top: 1px solid rgba(235, 0, 20, 0.22);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand mb-0 h1" href="/"><span class="brand-lock">Red</span> Vault</a>
    <span class="badge badge-secure rounded-pill px-3 py-2">Argon2id + AES-GCM</span>
  </nav>

  <main class="container py-4">
    <div class="row justify-content-center mb-4">
      <div class="col-lg-10">
        <div class="vault-card p-4 p-md-5">
          <h1 class="fw-bold mb-2">Your Passwords, Locked In Red</h1>
          <p class="text-light opacity-75 mb-0">
            Log in to see passwords you saved previously, or create an account to start a private vault.
          </p>
        </div>
      </div>
    </div>

    <div class="row g-4 justify-content-center">
      <div class="col-lg-5">
        <div class="vault-card p-4 h-100">
          <h2 class="h3 mb-3">Log In</h2>
          <form id="loginForm">
            <label for="loginUsername" class="form-label">Username</label>
            <input class="form-control mb-3" id="loginUsername" autocomplete="username" required />

            <label for="loginPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control mb-3"
              id="loginPassword"
              autocomplete="current-password"
              required
            />

            <button type="submit" class="btn btn-primary w-100">Log In to Vault</button>
          </form>
          <div id="loginStatus" class="mt-3 small opacity-75" aria-live="polite"></div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="vault-card p-4 h-100">
          <h2 class="h3 mb-3">Create Account</h2>
          <form id="registerForm">
            <label for="registerUsername" class="form-label">Username</label>
            <input class="form-control mb-3" id="registerUsername" autocomplete="username" required />

            <label for="registerPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control mb-2"
              id="registerPassword"
              autocomplete="new-password"
              minlength="12"
              required
            />
            <p class="small opacity-75">Use at least 12 characters. This password unlocks your encrypted records.</p>

            <button type="submit" class="btn btn-outline-light w-100">Create Private Vault</button>
          </form>
          <div id="registerStatus" class="mt-3 small opacity-75" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="app-footer text-center small py-3">
    &copy; Theo Cseledy
  </footer>

  <script>
    async function postAccountAction(url, payload) {
      return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    async function getError(response, fallback) {
      try {
        const data = await response.json();
        return data.error || fallback;
      } catch {
        return fallback;
      }
    }

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("loginStatus");
      status.textContent = "Signing in...";

      const response = await postAccountAction("/api/login", {
        username: document.getElementById("loginUsername").value.trim(),
        password: document.getElementById("loginPassword").value
      });

      const result = await response.json();
      if (response.ok) {
        status.textContent = "Login successful. Opening your saved passwords...";
        window.location.href = "/vault";
        return;
      }

      status.textContent = result.error || "Unable to log in.";
    });

    document.getElementById("registerForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const status = document.getElementById("registerStatus");
      status.textContent = "Creating your vault...";

      const response = await postAccountAction("/api/register", {
        username: document.getElementById("registerUsername").value.trim(),
        password: document.getElementById("registerPassword").value
      });

      if (response.ok) {
        status.textContent = "Account created. Opening your vault...";
        window.location.href = "/vault";
        return;
      }

      status.textContent = await getError(response, "Unable to create account.");
    });

    fetch("/api/status")
      .then((response) => response.json())
      .then((status) => {
        if (status.loggedIn) {
          window.location.href = "/vault";
        }
      });
  </script>
</body>
</html>
